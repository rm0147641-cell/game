<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Super Snake Fixed</title>
<style>
body { 
    margin: 0; padding: 0; overflow: hidden; 
    background: #020617; font-family: 'Segoe UI', sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh;
}
#ui { text-align: center; color: white; margin-bottom: 15px; }
.score-box { font-size: 32px; font-weight: bold; color: #22c55e; }
canvas { background: #0f172a; border: 2px solid #1e293b; }
</style>
</head>
<body>

<div id="ui">
<div class="score-box">Skor: <span id="scoreVal">0</span></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreVal = document.getElementById("scoreVal");

let gridSize, tileCount;
let snake = [];
let foods = []; 
let bombs = []; 
let lastMove = {x: 1, y: 0}; 
let score = 0;
let gameActive = true;

function init() {
    const size = Math.min(window.innerWidth * 0.8, window.innerHeight * 0.7);
    canvas.width = size;
    canvas.height = size;

    tileCount = 30; 
    gridSize = canvas.width / tileCount;
    
    snake = [{x: 5, y: Math.floor(tileCount/2)}];
    foods = [];
    bombs = [];
    score = 0;
    scoreVal.innerText = score;
    
    spawnItems('food', 1);
}

function spawnItems(type, count, temp = false) {
    for(let i = 0; i < count; i++) {
        let item = {
            x: Math.floor(Math.random() * (tileCount - 2)) + 1,
            y: Math.floor(Math.random() * (tileCount - 2)) + 1,
            type: type === 'food' ? '🍎' : '💣',
            createdAt: Date.now(),
            temporary: temp
        };

        const occupied =
            snake.some(p => p.x === item.x && p.y === item.y) ||
            foods.some(f => f.x === item.x && f.y === item.y) ||
            bombs.some(b => b.x === item.x && b.y === item.y);

        if (!occupied) {
            if (type === 'food') foods.push(item);
            else bombs.push(item);
        } else i--;
    }
}

window.addEventListener('keydown', e => {
    const k = e.key.toUpperCase();

    if (k === 'A') spawnItems('food', 5, true);
    if (k === 'S') spawnItems('food', 10, true);
    if (k === 'D') spawnItems('food', 20, true);

    if (k === 'Q') spawnItems('bomb', 5, true);
    if (k === 'W') spawnItems('bomb', 10, true);
    if (k === 'E') spawnItems('bomb', 20, true);
});

function isCollision(x, y) {
    if (x < 0 || x >= tileCount || y < 0 || y >= tileCount) return true;
    return snake.some(p => p.x === x && p.y === y);
}

function getSmartMove() {
    const head = snake[0];
    const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];

    if (foods.length === 0) return dirs[0];

    let target = foods[0];
    let min = Infinity;

    foods.forEach(f => {
        let d = Math.abs(head.x-f.x)+Math.abs(head.y-f.y);
        if (d < min) { min = d; target = f; }
    });

    return dirs.find(d => {
        let nx = head.x + d.x;
        let ny = head.y + d.y;
        return !isCollision(nx, ny);
    }) || lastMove;
}

function draw() {
    if (!gameActive) return;

    // ⏱️ 15 DETIK
    const now = Date.now();
    foods = foods.filter(f => !f.temporary || now - f.createdAt < 15000);
    bombs = bombs.filter(b => !b.temporary || now - b.createdAt < 15000);

    ctx.fillStyle = "#0f172a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = `${gridSize*0.7}px serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    foods.forEach(f => ctx.fillText(f.type, f.x*gridSize+gridSize/2, f.y*gridSize+gridSize/2));
    bombs.forEach(b => ctx.fillText(b.type, b.x*gridSize+gridSize/2, b.y*gridSize+gridSize/2));

    let move = getSmartMove();
    lastMove = move;

    let newHead = {x: snake[0].x + move.x, y: snake[0].y + move.y};

    // ❌ hanya mati jika tembok / badan
    if (isCollision(newHead.x, newHead.y)) {
        gameActive = false;
        alert("Game Over");
        return;
    }

    snake.unshift(newHead);

    // 💣 BOM = -50 poin (tidak reset)
    let bombIndex = bombs.findIndex(b => b.x === newHead.x && b.y === newHead.y);
    if (bombIndex !== -1) {
        bombs.splice(bombIndex, 1);
        score -= 50;
        if (score < 0) score = 0;
    }

    let foodIndex = foods.findIndex(f => f.x === newHead.x && f.y === newHead.y);
    if (foodIndex !== -1) {
        foods.splice(foodIndex, 1);
        score += 10;
    } else {
        snake.pop();
    }

    if (foods.length === 0) spawnItems('food', 1);

    scoreVal.innerText = score;

    setTimeout(() => requestAnimationFrame(draw), 50);
}

init();
draw();
</script>

</body>
</html>
