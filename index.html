<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Snake GOD AI</title>
<style>
body{
    margin:0;
    background:#020617;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    color:white;
    font-family:sans-serif;
}
canvas{background:#0f172a;border:2px solid #1e293b;}
</style>
</head>
<body>

<h2>Skor: <span id="score">0</span></h2>
<canvas id="c"></canvas>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
const scoreEl=document.getElementById("score");

let grid=30,size;
let snake,foods,bombs,score;
let path=[]; // hamilton path index
let indexMap={};

// 🔊 SOUND
function beep(f=400,t=100){
 let a=new (window.AudioContext||window.webkitAudioContext)();
 let o=a.createOscillator(),g=a.createGain();
 o.connect(g);g.connect(a.destination);
 o.frequency.value=f;o.start();
 g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+t/1000);
}

// 🧠 BUAT HAMILTONIAN PATH (snake loop aman)
function buildPath(){
    path=[];
    for(let y=0;y<grid;y++){
        if(y%2===0){
            for(let x=0;x<grid;x++) path.push({x,y});
        }else{
            for(let x=grid-1;x>=0;x--) path.push({x,y});
        }
    }
    indexMap={};
    path.forEach((p,i)=>indexMap[p.x+","+p.y]=i);
}

function init(){
    size=Math.min(window.innerWidth*0.8,window.innerHeight*0.7);
    canvas.width=size;
    canvas.height=size;

    snake=[{x:0,y:0}];
    foods=[];
    bombs=[];
    score=0;

    buildPath();
    spawn('food',1,false);
}

// spawn item
function spawn(type,n,temp){
    for(let i=0;i<n;i++){
        let tries=0;
        while(tries<50){
            tries++;
            let item={
                x:Math.floor(Math.random()*grid),
                y:Math.floor(Math.random()*grid),
                t:type,
                time:Date.now(),
                temp:temp
            };
            let used=snake.some(s=>s.x===item.x&&s.y===item.y)
            ||foods.some(f=>f.x===item.x&&f.y===item.y)
            ||bombs.some(b=>b.x===item.x&&b.y===item.y);
            if(!used){
                type==='food'?foods.push(item):bombs.push(item);
                break;
            }
        }
    }
}

// ⌨️ KEYBOARD
window.addEventListener("keydown",e=>{
 let k=e.key.toUpperCase();
 if(k==='A')spawn('food',5,true);
 if(k==='S')spawn('food',10,true);
 if(k==='D')spawn('food',20,true);
 if(k==='Q')spawn('bomb',5,true);
 if(k==='W')spawn('bomb',10,true);
 if(k==='E')spawn('bomb',20,true);
 if(k==='R')init(); // ✅ RESET
});

function collision(x,y){
 if(x<0||y<0||x>=grid||y>=grid) return true;
 return snake.some(s=>s.x===x&&s.y===y);
}

// 🧠 AI PERFECT
function nextMove(){
    let head=snake[0];
    let headIndex=indexMap[head.x+","+head.y];

    // default: ikut jalur aman
    let nextIndex=(headIndex+1)%path.length;
    let target=path[nextIndex];

    // 🧬 LEARNING: kalau buah dekat & aman → ambil shortcut
    let bestFood=null;
    let bestDist=999;

    foods.forEach(f=>{
        let d=Math.abs(head.x-f.x)+Math.abs(head.y-f.y);
        if(d<bestDist) {
            bestDist=d;
            bestFood=f;
        }
    });

    if(bestFood){
        let dx=Math.sign(bestFood.x-head.x);
        let dy=Math.sign(bestFood.y-head.y);

        let tryMove={x:head.x+dx,y:head.y+dy};

        let safe=!collision(tryMove.x,tryMove.y)
        && !bombs.some(b=>b.x===tryMove.x&&b.y===tryMove.y);

        if(safe){
            return {x:dx,y:dy};
        }
    }

    // fallback ke path aman
    return {
        x:target.x-head.x,
        y:target.y-head.y
    };
}

function draw(){
 let now=Date.now();

 foods=foods.filter(f=>!f.temp||now-f.time<15000);
 bombs=bombs.filter(b=>!b.temp||now-b.time<15000);

 ctx.fillStyle="#0f172a";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 let g=canvas.width/grid;

 ctx.font=g*0.7+"px serif";
 ctx.textAlign="center";
 ctx.textBaseline="middle";

 foods.forEach(f=>{
    let age=now-f.time;
    if(f.temp && age>12000){
        if(Math.floor(age/200)%2===0)return;
    }
    ctx.fillText("🍎",f.x*g+g/2,f.y*g+g/2);
 });

 bombs.forEach(b=>{
    let age=now-b.time;
    if(b.temp && age>12000){
        if(Math.floor(age/200)%2===0)return;
    }
    ctx.fillText("💣",b.x*g+g/2,b.y*g+g/2);
 });

 // snake
 ctx.strokeStyle="#22c55e";
 ctx.lineWidth=g-4;
 ctx.beginPath();
 ctx.moveTo(snake[0].x*g+g/2,snake[0].y*g+g/2);
 for(let i=1;i<snake.length;i++){
    ctx.lineTo(snake[i].x*g+g/2,snake[i].y*g+g/2);
 }
 ctx.stroke();

 let h=snake[0];
 ctx.fillStyle="#4ade80";
 ctx.beginPath();
 ctx.arc(h.x*g+g/2,h.y*g+g/2,g/2*0.8,0,Math.PI*2);
 ctx.fill();

 let move=nextMove();

 let nx=h.x+move.x;
 let ny=h.y+move.y;

 if(collision(nx,ny)){
    beep(100,200);
    init();
    return;
 }

 snake.unshift({x:nx,y:ny});

 let bi=bombs.findIndex(b=>b.x===nx&&b.y===ny);
 if(bi!=-1){
    bombs.splice(bi,1);
    score-=50;
    if(score<0)score=0;
    beep(150,150);
 }

 let fi=foods.findIndex(f=>f.x===nx&&f.y===ny);
 if(fi!=-1){
    foods.splice(fi,1);
    score+=10;
    beep(600,100);
 }else{
    snake.pop();
 }

 if(foods.length===0) spawn('food',1,false);

 scoreEl.innerText=score;

 setTimeout(()=>requestAnimationFrame(draw),40);
}

init();
draw();
</script>

</body>
</html>
