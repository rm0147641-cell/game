<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Super Snake AI - Stable</title>
<style>
body { 
    margin: 0; padding: 0; overflow: hidden; 
    background: #020617; font-family: 'Segoe UI', sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh;
}
#ui { text-align: center; color: white; margin-bottom: 15px; }
.score-box { font-size: 32px; font-weight: bold; color: #22c55e; }
canvas { background: #0f172a; border: 2px solid #1e293b; }
</style>
</head>
<body>

<div id="ui">
<div class="score-box">Skor: <span id="scoreVal">0</span></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreVal = document.getElementById("scoreVal");

let gridSize, tileCount;
let snake = [];
let foods = []; 
let bombs = []; 
let lastMove = {x: 1, y: 0}; 
let score = 0;
let gameActive = true;

function init() {
    const size = Math.min(window.innerWidth * 0.8, window.innerHeight * 0.7);
    canvas.width = size;
    canvas.height = size;

    tileCount = 30; 
    gridSize = canvas.width / tileCount;
    
    snake = [{x: 5, y: Math.floor(tileCount/2)}];
    foods = [];
    bombs = [];
    score = 0;
    scoreVal.innerText = score;
    
    spawnItems('food', 1, false); // buah permanen
}

function spawnItems(type, count, temp = false) {
    for(let i = 0; i < count; i++) {

        let attempts = 0;
        let placed = false;

        while (!placed && attempts < 50) {
            attempts++;

            let item = {
                x: Math.floor(Math.random() * (tileCount - 2)) + 1,
                y: Math.floor(Math.random() * (tileCount - 2)) + 1,
                type: type === 'food' ? '🍎' : '💣',
                createdAt: Date.now(),
                temporary: temp
            };

            const occupied =
                snake.some(p => p.x === item.x && p.y === item.y) ||
                foods.some(f => f.x === item.x && f.y === item.y) ||
                bombs.some(b => b.x === item.x && b.y === item.y);

            if (!occupied) {
                if (type === 'food') foods.push(item);
                else bombs.push(item);
                placed = true;
            }
        }
    }
}

window.addEventListener('keydown', e => {
    const k = e.key.toUpperCase();

    if (k === 'A') spawnItems('food', 5, true);
    if (k === 'S') spawnItems('food', 10, true);
    if (k === 'D') spawnItems('food', 20, true);

    if (k === 'Q') spawnItems('bomb', 5, true);
    if (k === 'W') spawnItems('bomb', 10, true);
    if (k === 'E') spawnItems('bomb', 20, true);
});

window.addEventListener('resize', init);

function isCollision(x, y) {
    if (x < 0 || x >= tileCount || y < 0 || y >= tileCount) return true;
    return snake.some(p => p.x === x && p.y === y);
}

function getSmartMove() {
    const head = snake[0];
    const dirs = [
        {x:1,y:0},
        {x:-1,y:0},
        {x:0,y:1},
        {x:0,y:-1}
    ];

    // urutkan berdasarkan jarak ke buah
    let best = dirs
        .map(d => {
            let nx = head.x + d.x;
            let ny = head.y + d.y;

            if (isCollision(nx, ny)) return null;

            let minDist = Infinity;
            foods.forEach(f => {
                let dist = Math.abs(nx - f.x) + Math.abs(ny - f.y);
                if (dist < minDist) minDist = dist;
            });

            return {dir: d, dist: minDist};
        })
        .filter(v => v !== null)
        .sort((a,b) => a.dist - b.dist);

    return best.length > 0 ? best[0].dir : lastMove;
}

function draw() {
    if (!gameActive) return;

    const now = Date.now();

    // hapus hanya temporary (15 detik)
    foods = foods.filter(f => !f.temporary || now - f.createdAt < 15000);
    bombs = bombs.filter(b => !b.temporary || now - b.createdAt < 15000);

    ctx.fillStyle = "#0f172a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = `${gridSize*0.7}px serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // gambar item
    foods.forEach(f => ctx.fillText(f.type, f.x*gridSize+gridSize/2, f.y*gridSize+gridSize/2));
    bombs.forEach(b => ctx.fillText(b.type, b.x*gridSize+gridSize/2, b.y*gridSize+gridSize/2));

    // 🐍 gambar ular
    if (snake.length > 0) {
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "#22c55e";
        ctx.lineWidth = gridSize - 4;

        ctx.beginPath();
        ctx.moveTo(
            snake[0].x * gridSize + gridSize/2,
            snake[0].y * gridSize + gridSize/2
        );

        for (let i = 1; i < snake.length; i++) {
            ctx.lineTo(
                snake[i].x * gridSize + gridSize/2,
                snake[i].y * gridSize + gridSize/2
            );
        }
        ctx.stroke();

        const h = snake[0];
        ctx.fillStyle = "#4ade80";
        ctx.beginPath();
        ctx.arc(
            h.x * gridSize + gridSize/2,
            h.y * gridSize + gridSize/2,
            gridSize/2 * 0.8,
            0,
            Math.PI * 2
        );
        ctx.fill();
    }

    // gerak AI
    let move = getSmartMove();
    lastMove = move;

    let newHead = {
        x: snake[0].x + move.x,
        y: snake[0].y + move.y
    };

    // mati hanya kalau nabrak tembok / badan
    if (isCollision(newHead.x, newHead.y)) {
        gameActive = false;
        alert("Game Over");
        return;
    }

    snake.unshift(newHead);

    // bom = -50 poin
    let bIndex = bombs.findIndex(b => b.x === newHead.x && b.y === newHead.y);
    if (bIndex !== -1) {
        bombs.splice(bIndex, 1);
        score -= 50;
        if (score < 0) score = 0;
    }

    // makan buah
    let fIndex = foods.findIndex(f => f.x === newHead.x && f.y === newHead.y);
    if (fIndex !== -1) {
        foods.splice(fIndex, 1);
        score += 10;
    } else {
        snake.pop();
    }

    if (foods.length === 0) spawnItems('food', 1, false);

    scoreVal.innerText = score;

    setTimeout(() => requestAnimationFrame(draw), 60);
}

init();
draw();
</script>

</body>
</html>
